<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iphit ❤️ Maesaroh</title>

<style>

body{
margin:0;
font-family:Segoe UI;
color:white;
text-align:center;
overflow:hidden;
background:url(background.jpg);
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* CONTENT */

#content{
position:absolute;
top:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.photo{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
}

/* BUTTON */

button{
padding:14px 26px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

#yes{background:#2ecc71;color:white;}

#no{
background:#ff2e63;
color:white;
position:absolute;
left:60%;
top:80%;
}

/* YES SCREEN */

#yesScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
visibility:hidden;
z-index:10;
font-size:40px;
}

/* STORY SCREEN */

#storyScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
visibility:hidden;
z-index:20;
}

.storySlide{
width:300px;
height:300px;
position:relative;
overflow:hidden;
border-radius:20px;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

</style>
</head>

<body>

<div id="content">

<h1>Hai Maesaroh ❤️</h1>

<img src="foto1.jpg" class="photo">

<h2>Maukah kamu menjadi bagian dari hidupku?</h2>

<button id="yes" onclick="yes()">Aku Mau ❤️</button>

<button id="no" onmouseover="run()">Aku Tidak Mau 😆</button>

</div>


<!-- YES SCREEN -->

<div id="yesScreen">

<h1>She Said YES ❤️</h1>

<button onclick="openStory()">Next ➜</button>

</div>


<!-- STORY SCREEN -->

<div id="storyScreen">

<h1>Our Memories ❤️</h1>

<div class="storySlide">

<img src="foto1.jpg" class="slide active">
<img src="foto2.jpg" class="slide">
<img src="foto3.jpg" class="slide">
<img src="foto4.jpg" class="slide">

</div>

<div style="margin-top:30px">

<button onclick="backYes()">⬅ Back</button>

<button onclick="nextSlide()">Next ➜</button>

</div>

</div>


<script>

/* tombol tidak mau kabur */

function run(){

let btn=document.getElementById("no");

let x=Math.random()*(window.innerWidth-200);

let y=Math.random()*(window.innerHeight-100);

btn.style.left=x+"px";
btn.style.top=y+"px";

}

/* YES */

function yes(){

document.getElementById("yesScreen").style.visibility="visible";

}

/* buka slideshow */

function openStory(){

document.getElementById("yesScreen").style.visibility="hidden";

document.getElementById("storyScreen").style.visibility="visible";

}

/* kembali */

function backYes(){

document.getElementById("storyScreen").style.visibility="hidden";

document.getElementById("yesScreen").style.visibility="visible";

}

/* slideshow */

let slides=document.querySelectorAll(".slide");

let index=0;

function nextSlide(){

slides[index].classList.remove("active");

index++;

if(index>=slides.length){
index=0;
}

slides[index].classList.add("active");

}

</script>

</body>
</html>
